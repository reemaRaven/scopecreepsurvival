<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — ScopeCreep Survival</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f1a;
      --bg2:     #1a1a2e;
      --teal:    #00f5d4;
      --orange:  #ff6b35;
      --yellow:  #ffe66d;
      --red:     #ff4757;
      --text:    #e0e0f0;
      --muted:   #7a85a0;
      --border:  #252540;
      --font-px: 'Press Start 2P', monospace;
      --font:    'DM Sans', sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Dot grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,245,212,0.11) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 52px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15,15,26,0.93);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--font-px);
      font-size: 9px;
      line-height: 1.7;
      color: var(--teal);
      text-decoration: none;
      text-shadow: 0 0 8px rgba(0,245,212,0.5);
    }

    .nav-back {
      font-family: var(--font-px);
      font-size: 6px;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 7px 13px;
      letter-spacing: 0.08em;
      transition: all 0.15s;
    }
    .nav-back:hover { color: var(--teal); border-color: var(--teal); }

    /* ── PAGE ── */
    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    /* Auth-check loading overlay */
    #auth-loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      transition: opacity 0.25s ease;
    }
    #auth-loading.hide { opacity: 0; pointer-events: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .loading-dot {
      font-family: var(--font-px);
      font-size: 8px;
      color: var(--teal);
      animation: blink 1s steps(1) infinite;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: 3px solid var(--teal);
      padding: 40px 36px 36px;
      position: relative;
      text-align: center;
    }

    /* Orange corner accent */
    .card::before {
      content: '';
      position: absolute;
      top: -3px; right: -1px;
      width: 32px; height: 32px;
      border-top: 3px solid var(--orange);
      border-right: 1px solid var(--border);
    }

    /* Game icon / title */
    .card-icon {
      font-size: 36px;
      margin-bottom: 16px;
    }

    .card-title {
      font-family: var(--font-px);
      font-size: 12px;
      color: var(--teal);
      text-shadow: 0 0 8px rgba(0,245,212,0.4);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 36px;
      line-height: 1.5;
    }

    /* ── ERROR BANNER ── */
    .banner-error {
      font-family: var(--font-px);
      font-size: 6px;
      letter-spacing: 0.06em;
      padding: 10px 12px;
      margin-bottom: 18px;
      border-left: 3px solid var(--red);
      background: rgba(255,71,87,0.08);
      color: var(--red);
      text-align: left;
      line-height: 1.8;
      display: none;
    }
    .banner-error.visible { display: block; }

    /* ── GOOGLE BUTTON ── */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      font-family: var(--font-px);
      font-size: 8px;
      padding: 15px;
      background: #fff;
      color: #1f1f2e;
      border: none;
      cursor: pointer;
      letter-spacing: 0.06em;
      box-shadow: 4px 4px 0 #b0b0b8;
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.15s;
      margin-bottom: 14px;
    }
    .btn-google:hover  { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 #b0b0b8; }
    .btn-google:active { transform: translate(2px, 2px);  box-shadow: 2px 2px 0 #b0b0b8; }
    .btn-google:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      font-family: var(--font-px);
      font-size: 6px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── GUEST BUTTON ── */
    .btn-guest {
      display: block;
      width: 100%;
      font-family: var(--font-px);
      font-size: 7px;
      padding: 13px;
      background: transparent;
      color: var(--teal);
      border: 1px solid rgba(0,245,212,0.35);
      text-decoration: none;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-guest:hover { background: rgba(0,245,212,0.07); border-color: var(--teal); }

    /* ── FOOTNOTE ── */
    .card-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 22px;
      line-height: 1.5;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 18px 20px;
      border-top: 1px solid var(--border);
      background: rgba(15,15,26,0.8);
    }
    footer p { font-size: 11px; color: var(--muted); }
    footer a  { color: var(--teal); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 440px) {
      .card { padding: 32px 20px 28px; }
    }
  </style>
</head>
<body>

  <!-- Auth-check overlay -->
  <div id="auth-loading"><span class="loading-dot">CHECKING SESSION...</span></div>

  <!-- ── NAV ── -->
  <nav>
    <a class="nav-logo" href="landing.html">SCOPECREEP<br>SURVIVAL</a>
    <a class="nav-back" href="landing.html">← BACK</a>
  </nav>

  <!-- ── CARD ── -->
  <div class="page">
    <div class="card">

      <div class="card-icon">🎮</div>
      <h1 class="card-title">SIGN IN TO PLAY</h1>
      <p class="card-sub">Your sprint won't manage itself.</p>

      <!-- Error banner -->
      <div class="banner-error" id="err-banner"></div>

      <!-- Google sign-in -->
      <button class="btn-google" id="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        CONTINUE WITH GOOGLE
      </button>

      <div class="divider">OR</div>

      <a class="btn-guest" href="game.html">PLAY AS GUEST (NO ACCOUNT)</a>

      <p class="card-note">
        Signing in saves your progress and unlocks achievements across sessions.
      </p>

    </div>
  </div>

  <!-- ── FOOTER ── -->
  <footer>
    <p><a href="landing.html">ScopeCreep Survival</a> · Made by Reema Majumdar · 2025</p>
  </footer>

  <!-- ── FIREBASE ── -->
  <script type="module">
    import { initializeApp }
      from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js'
    import { getAnalytics }
      from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-analytics.js'
    import {
      getAuth,
      onAuthStateChanged,
      signInWithPopup,
      GoogleAuthProvider,
    } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js'

    const app = initializeApp({
      apiKey:            'AIzaSyA7PYljYgfVOcMQontn17bcP0rzPZcBH5k',
      authDomain:        'scopecreepsurvival.firebaseapp.com',
      projectId:         'scopecreepsurvival',
      storageBucket:     'scopecreepsurvival.firebasestorage.app',
      messagingSenderId: '175127345845',
      appId:             '1:175127345845:web:4220713981a38d69de9cfc',
      measurementId:     'G-1X0VXGEJ49',
    })

    getAnalytics(app)
    const auth   = getAuth(app)
    const google = new GoogleAuthProvider()

    // ── If already signed in, go straight to the game ─────────────────────────
    onAuthStateChanged(auth, user => {
      const overlay = document.getElementById('auth-loading')
      if (user) {
        window.location.replace('game.html')
      } else {
        overlay.classList.add('hide')
        setTimeout(() => overlay.remove(), 280)
      }
    })

    // ── Error messages ─────────────────────────────────────────────────────────
    const ERR = {
      'auth/popup-blocked':          'POPUP BLOCKED. PLEASE ALLOW POPUPS FOR THIS SITE.',
      'auth/account-exists-with-different-credential':
                                     'ACCOUNT EXISTS WITH DIFFERENT METHOD.',
      'auth/network-request-failed': 'NETWORK ERROR. CHECK YOUR CONNECTION.',
      'auth/too-many-requests':      'TOO MANY ATTEMPTS. PLEASE WAIT.',
      'auth/user-disabled':          'THIS ACCOUNT HAS BEEN DISABLED.',
    }

    function showError(msg) {
      const el = document.getElementById('err-banner')
      el.textContent = msg
      el.classList.add('visible')
    }

    // ── Google sign-in ─────────────────────────────────────────────────────────
    document.getElementById('btn-google').addEventListener('click', async () => {
      const btn = document.getElementById('btn-google')
      btn.disabled    = true
      btn.textContent = 'SIGNING IN...'

      document.getElementById('err-banner').classList.remove('visible')

      try {
        await signInWithPopup(auth, google)
        // onAuthStateChanged fires → redirects to index.html
      } catch (err) {
        btn.disabled    = false
        btn.innerHTML = `
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          CONTINUE WITH GOOGLE`

        // Silently ignore user closing the popup
        if (err.code === 'auth/popup-closed-by-user' ||
            err.code === 'auth/cancelled-popup-request') return

        showError(ERR[err.code] || ('ERROR: ' + err.code.replace('auth/', '').toUpperCase()))
      }
    })
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

</body>
</html>
